---
- name: System Information Check
  hosts: all
  gather_facts: true

  tasks:
    - name: Show hostname
      debug:
        msg: "Hostname: {{ ansible_hostname }}"

    - name: Show OS
      debug:
        msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Show Kernel version
      debug:
        msg: "Kernel: {{ ansible_kernel }}"
